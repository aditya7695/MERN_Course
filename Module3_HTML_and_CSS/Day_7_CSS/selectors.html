<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Courier New', Courier, monospace;
        }
        p{
            color: red;
        }
        .highlight{
            color: black;
            background-color: yellow;
        }
        #unique{
            color: black;
            background-color: aqua;
        }
        button{
            padding: 8px 10px;
            border-radius: 8px;
        }
        .primary{
            background-color: blue;
            color: black;
        }

    </style>
</head>
<body>
    <section>
        <h1>Hello World</h1>
        <p class="highlight">Highlight Element</p>
        <p id="unique">Unique Element</p>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Aliquid possimus dolorum porro nam eos sapiente atque error incidunt, quam rem. Fuga, omnis hic consectetur doloribus earum molestiae quibusdam amet. Magnam?</p>
        <button>Click Me</button>
        <button class="primary">Primary Button</button>
    </section>
</body>
</html>
