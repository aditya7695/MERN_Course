<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hover-btn{
            background-color: yellowgreen;
            color: black;
            border: none;
            padding: 8px 16px;
        }

        .hover-btn:hover{
            background-color: orange;
        }

        .menu li:first-child{
            font-weight: bold;
        }

        .striped-list li:nth-child(even){
            background-color: springgreen;
        }

        .striped-list li:nth-child(odd){
            background-color: pink;
        }
    </style>
</head>
<body>
    <section id="pseudo-classes">
        <h2>Pseudo Classes</h2>
        <button class="hover-btn">Hover Me</button>
        <ul class="menu">
            <li>Home</li>
            <li>About</li>
            <li>Services</li>
            <li>Contacts</li>
        </ul>
        <ul class="striped-list">
            <li>Row 1</li>
            <li>Row 2</li>
            <li>Row 3</li>
            <li>Row 4</li>
            <li>Row 5</li>
            <li>Row 6</li>
            <li>Row 7</li>
            <li>Row 8</li>
            <li>Row 9</li>
            <li>Row 10</li>
        </ul>
    </section>
</body>
</html>
