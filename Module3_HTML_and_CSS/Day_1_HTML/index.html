<!DOCTYPE html>  
<!-- specefying that the below page is document type and uses HTML5 version -->

<html lang="en">
<!-- Wraps the entire webpage -->

<head>
<!-- Wraps all the information that is not visible on the screen -->
    <meta charset="UTF-8">
    <!-- meta tag specify will the info not to show on the screen -->
    <!-- charset="UTF-8" : Decoding method for web page -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>
    <!-- Specifies the title of the webpage that is visible on the tab -->

</head>

<body>
<!-- It contains the things which is visible on the screen -->
 <!-- These are some heading tags -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

<!-- These are paragraph tag -->
    <p>This is paragraph</p>


</body>
</html>
